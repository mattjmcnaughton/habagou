name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/habagou/web/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: src/habagou/web/frontend
        run: pnpm install --frozen-lockfile

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Run gate
        run: just gate

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: habagou
          POSTGRES_USER: habagou
          POSTGRES_PASSWORD: habagou
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habagou -d habagou"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgresql+asyncpg://habagou:habagou@localhost:5432/habagou
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Run integration tests
        run: just test-integration

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Run e2e scaffold
        run: just test-e2e

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Check OpenAPI drift
        run: just openapi-check

  traceability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Run traceability placeholder
        run: just verify-traceability
