name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/habagou/web/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: src/habagou/web/frontend
        run: pnpm install --frozen-lockfile

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Run gate
        env:
          PYTEST_ADDOPTS: --junitxml=.artifacts/test-results/unit.xml
        run: mkdir -p .artifacts/test-results && just gate

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: .artifacts/test-results/unit.xml
          if-no-files-found: error

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: habagou
          POSTGRES_USER: habagou
          POSTGRES_PASSWORD: habagou
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habagou -d habagou"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgresql+asyncpg://habagou:habagou@localhost:5432/habagou
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Run integration tests
        env:
          PYTEST_ADDOPTS: --junitxml=.artifacts/test-results/integration.xml
        run: mkdir -p .artifacts/test-results && just bootstrap && just test-integration

      - name: Run data invariant check
        run: uv run python scripts/check_invariants.py --dsn "$DATABASE_URL"

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: .artifacts/test-results/integration.xml
          if-no-files-found: error

      - name: Verify migration downgrade
        run: uv run alembic downgrade base

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: habagou
          POSTGRES_USER: habagou
          POSTGRES_PASSWORD: habagou
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habagou -d habagou"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgresql+asyncpg://habagou:habagou@localhost:5432/habagou
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/habagou/web/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: src/habagou/web/frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: src/habagou/web/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Run e2e suite
        env:
          PYTEST_ADDOPTS: --junitxml=.artifacts/test-results/e2e.xml
        run: mkdir -p .artifacts/test-results && just test-e2e

      - name: Upload e2e test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e
          path: |
            .artifacts/test-results/e2e.xml
            .artifacts/test-results/playwright.json
          if-no-files-found: error

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/habagou/web/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: src/habagou/web/frontend
        run: pnpm install --frozen-lockfile

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Check OpenAPI drift
        run: just openapi-check

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Run Compose smoke
        run: just compose-smoke
