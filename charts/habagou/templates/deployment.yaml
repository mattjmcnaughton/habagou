apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "habagou.fullname" . }}
  labels:
    {{- include "habagou.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "habagou.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "habagou.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "habagou.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "habagou.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "habagou.fullname" . }}-env
            {{- if .Values.externalSecrets.enabled }}
            - secretRef:
                name: {{ include "habagou.fullname" . }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.writableVolumes.tmp.enabled .Values.writableVolumes.cache.enabled }}
          volumeMounts:
            {{- if .Values.writableVolumes.tmp.enabled }}
            - name: tmp
              mountPath: {{ .Values.writableVolumes.tmp.mountPath }}
            {{- end }}
            {{- if .Values.writableVolumes.cache.enabled }}
            - name: cache
              mountPath: {{ .Values.writableVolumes.cache.mountPath }}
            {{- end }}
          {{- end }}
      {{- if or .Values.writableVolumes.tmp.enabled .Values.writableVolumes.cache.enabled }}
      volumes:
        {{- if .Values.writableVolumes.tmp.enabled }}
        - name: tmp
          emptyDir:
            {{- toYaml .Values.writableVolumes.tmp.emptyDir | nindent 12 }}
        {{- end }}
        {{- if .Values.writableVolumes.cache.enabled }}
        - name: cache
          emptyDir:
            {{- toYaml .Values.writableVolumes.cache.emptyDir | nindent 12 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
