# Used by CI to render the chart for validation. Keep close to defaults so
# all templates exercise their normal code paths.
image:
  repository: ghcr.io/mattjmcnaughton/habagou
  tag: "ci"

env:
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  HOST: "0.0.0.0"
  PORT: "8000"
  REQUIRE_FRONTEND: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4318"
  XDG_CACHE_HOME: /home/app/.cache
  HABAGOU_BOOTSTRAP_ATTEMPTS: "30"
  HABAGOU_BOOTSTRAP_RETRY_SECONDS: "2"

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: homelab/habagou/database-url
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: homelab/habagou/admin-token

ingress:
  enabled: true
  className: tailscale
  hostname: habagou-ci
  tls: true
