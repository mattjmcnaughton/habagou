services:
  app:
    build:
      context: .
      target: production
    environment:
      DATABASE_URL: postgresql+asyncpg://habagou:habagou@db:5432/habagou
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: INFO
      LOG_FORMAT: console
      REQUIRE_FRONTEND: "true"
      XDG_CACHE_HOME: /home/app/.cache
    ports:
      - "8000:8000"
    volumes:
      - corpus-cache:/home/app/.cache/habagou
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5))['status'])\"",
        ]
      interval: 5s
      timeout: 10s
      retries: 30

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: habagou
      POSTGRES_USER: habagou
      POSTGRES_PASSWORD: habagou
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habagou -d habagou"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
  corpus-cache:
