# fly.toml — https://fly.io/docs/reference/configuration/

app = 'habagou'
primary_region = 'ewr'

[build]
  build-target = 'production'

[deploy]
  # ENTRYPOINT still runs; Fly sets RELEASE_COMMAND=1 on the release machine,
  # which gates migrate + import + seed in docker/entrypoint.sh.
  release_command = 'true'

[env]
  LOG_LEVEL = 'INFO'
  LOG_FORMAT = 'json'
  HOST = '0.0.0.0'
  PORT = '8000'
  REQUIRE_FRONTEND = 'true'
  OTEL_EXPORTER_OTLP_ENDPOINT = ''
  XDG_CACHE_HOME = '/home/app/.cache'
  HABAGOU_RUN_BOOTSTRAP = '0'
  HABAGOU_BOOTSTRAP_ATTEMPTS = '10'
  HABAGOU_BOOTSTRAP_RETRY_SECONDS = '2'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '30s'
    method = 'GET'
    path = '/readyz'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
