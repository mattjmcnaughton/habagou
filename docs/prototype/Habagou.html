document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\n.chip { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }\n.acts { display: flex; flex-direction: column; gap: 10px; }\n.act { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; width: 100%; text-align: left; transition: border-color .15s; }\n.act:hover { border-color: rgba(95,184,154,.35); }\n.act-ic { width: 38px; height: 38px; border-radius: 11px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }\n.act-main { flex: 1; }\n.act-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }\n.act-sub { font-size: 12.5px; color: var(--muted); margin-top: 1px; }\n.check { color: var(--accent-bright); font-size: 13px; }\n.best { font-size: 11.5px; color: var(--accent-bright); background: rgba(95,184,154,.1); border-radius: 99px; padding: 2px 8px; }\n.reset { margin-top: 26px; text-align: center; }\n.reset button { color: var(--faint); font-size: 13px; text-decoration: underline; text-underline-offset: 3px; }\n.reset button:hover { color: var(--error-bright); }\n\n/* ---------- activity shared ---------- */\n.abar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }\n.counter { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }\n.pbar { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 20px; }\n.pfill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s ease; }\n.char-meta { text-align: center; margin-bottom: 14px; }\n.pinyin { font-size: 20px; font-weight: 600; color: var(--accent-bright); }\n.meaning { font-size: 14px; color: var(--muted); margin-top: 2px; }\n.canvas-card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 10px; margin-bottom: 14px; }\n#hw-target { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }\n#hw-target svg { display: block; }\n.instr { text-align: center; font-size: 14px; color: var(--muted); min-height: 22px; margin-bottom: 14px; }\n.footer-acts { display: flex; gap: 10px; }\n.fbtn { flex: 1; padding: 12px; border-radius: 14px; background: var(--surface); border: 1px solid var(--border); font-size: 14px; font-weight: 500; color: var(--text); }\n.fbtn:hover { border-color: rgba(232,236,238,.25); }\n.cta { width: 100%; padding: 14px; border-radius: 14px; background: var(--accent); color: var(--accent-dark); font-size: 15px; font-weight: 700; }\n.cta:hover { background: var(--accent-bright); }\n.complete-line { text-align: center; font-size: 15px; color: var(--accent-bright); font-weight: 600; margin-bottom: 12px; }\n\n/* ---------- done ---------- */\n.done { text-align: center; padding-top: 48px; }\n.done .big { font-size: 52px; margin-bottom: 14px; }\n.done h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }\n.done p { color: var(--muted); font-size: 14px; margin-bottom: 26px; }\n.done .rec { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--accent-bright); background: rgba(95,184,154,.1); border: 1px solid rgba(95,184,154,.3); border-radius: 99px; padding: 5px 12px; margin-bottom: 26px; }\n\n/* ---------- match ---------- */\n.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }\n.mcol { display: flex; flex-direction: column; gap: 10px; }\n.mcard { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; min-height: 62px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all .15s ease; padding: 8px; }\n.mcard .l { font-size: 15px; font-weight: 500; }\n.mcard.hanzi .l { font-size: 28px; }\n.mcard .s { font-size: 12px; color: var(--muted); }\n.mcard.sel { border: 1.5px solid var(--accent); background: rgba(95,184,154,.14); }\n.mcard.ok { border-color: rgba(95,184,154,.4); background: rgba(95,184,154,.12); color: var(--accent-bright); opacity: .5; cursor: default; }\n.mcard.ok .s { color: rgba(127,207,174,.7); }\n.mcard.bad { border-color: var(--error); background: rgba(201,106,94,.14); color: var(--error-bright); animation: shakeX .4s; }\n@keyframes shakeX { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-5px); } 40%,80% { transform: translateX(5px); } }\n\n/* ---------- sentence ---------- */\n.s-meta { text-align: center; margin-bottom: 12px; }\n.s-trans { font-size: 17px; font-weight: 600; }\n.s-pin { font-size: 13px; color: var(--muted); margin-top: 2px; }\n.cells { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }\n.cell { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; font-size: 28px; border-radius: 12px; transition: all .2s ease; color: var(--faint); background: var(--surface); box-shadow: inset 0 0 0 1px rgba(232,236,238,.08); }\n.cell.active { color: var(--accent-bright); box-shadow: inset 0 0 0 2px var(--accent); }\n.cell.done { color: var(--accent-dark); background: var(--accent); box-shadow: none; }\n\n/* ---------- events console ---------- */\n.evbar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 50; }\n.evbar-inner { width: 100%; max-width: 440px; padding: 0 18px 14px; pointer-events: auto; }\n.evtoggle { width: 100%; display: flex; align-items: center; justify-content: space-between; background: rgba(27,31,34,.92); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; font-size: 12.5px; color: var(--muted); }\n.evtoggle b { color: var(--text); font-weight: 600; }\n.evtoggle .cnt { color: var(--accent-bright); font-variant-numeric: tabular-nums; }\n.evpanel { display: none; background: rgba(20,23,25,.97); border: 1px solid var(--border); border-bottom: none; border-radius: 14px 14px 0 0; max-height: 42vh; overflow: auto; padding: 10px 12px; margin-bottom: -1px; }\n.evpanel.open { display: block; }\n.evnote { font-size: 11px; color: var(--faint); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }\n.evrow { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; line-height: 1.7; color: var(--muted); white-space: nowrap; }\n.evrow .wf { color: var(--accent-bright); }\n.evrow .nm { color: var(--text); }\n.evrow .fl { color: var(--faint); }\n.evrow.err .wf, .evrow.err .nm { color: var(--error-bright); }\n<\/style>\n<\/head>\n<body>\n<div class=\"app\" id=\"app\"><\/div>\n\n<script src=\"04f98818-db31-470e-9356-2c3e5b3db89a\"><\/script>\n\n<div class=\"evbar\"><div class=\"evbar-inner\">\n  <div class=\"evpanel\" id=\"evpanel\">\n    <div class=\"evnote\">Workflow events (VERIFICATION §5) — the same IDs the real backend emits via <b>events.py<\/b>. Prototype data is in-memory; progress resets on reload.<\/div>\n    <div id=\"evlist\"><\/div>\n  <\/div>\n  <button class=\"evtoggle\" id=\"evtoggle\"><span><b>▤ workflow events<\/b> · WF-keyed instrumentation<\/span><span class=\"cnt\" id=\"evcount\">0<\/span><\/button>\n<\/div><\/div>\n\n<script>\n(function () {\n'use strict';\n\n/* =====================================================================\n   Mock database — mirrors TDD §3 (users, packs, pack_characters,\n   pack_sentences, activity_completions). In-memory; resets on reload.\n   ===================================================================== */\nvar GUEST = { id: '00000000-0000-4000-8000-000000000001', username: 'guest', display_name: 'Guest', is_guest: true };\n\nvar PACKS = [\n  { slug: 'greetings', title: 'Greetings', glyph: '\\u4f60', color: '#c4633f', status: 'published', sort_order: 1,\n    chars: [\n      { hanzi: '\\u4f60', pinyin: 'n\\u01d0', meaning: 'you' },\n      { hanzi: '\\u597d', pinyin: 'h\\u01ceo', meaning: 'good' },\n      { hanzi: '\\u6211', pinyin: 'w\\u01d2', meaning: 'I, me' },\n      { hanzi: '\\u4ed6', pinyin: 't\\u0101', meaning: 'he, him' },\n      { hanzi: '\\u8c22', pinyin: 'xi\\u00e8', meaning: 'thanks' }\n    ],\n    sentences: [\n      { hanzi: '\\u4f60\\u597d', pinyin: 'n\\u01d0 h\\u01ceo', translation: 'Hello' },\n      { hanzi: '\\u6211\\u5f88\\u597d', pinyin: 'w\\u01d2 h\\u011bn h\\u01ceo', translation: 'I am well' },\n      { hanzi: '\\u8c22\\u8c22\\u4f60', pinyin: 'xi\\u00e8xie n\\u01d0', translation: 'Thank you' }\n    ] },\n  { slug: 'numbers', title: 'Numbers', glyph: '\\u4e09', color: '#3f8a86', status: 'published', sort_order: 2,\n    chars: [\n      { hanzi: '\\u4e00', pinyin: 'y\\u012b', meaning: 'one' },\n      { hanzi: '\\u4e8c', pinyin: '\\u00e8r', meaning: 'two' },\n      { hanzi: '\\u4e09', pinyin: 's\\u0101n', meaning: 'three' },\n      { hanzi: '\\u56db', pinyin: 's\\u00ec', meaning: 'four' },\n      { hanzi: '\\u4e94', pinyin: 'w\\u01d4', meaning: 'five' }\n    ],\n    sentences: [\n      { hanzi: '\\u4e00\\u4e8c\\u4e09', pinyin: 'y\\u012b \\u00e8r s\\u0101n', translation: 'One two three' },\n      { hanzi: '\\u4e09\\u4e2a\\u4eba', pinyin: 's\\u0101n ge r\\u00e9n', translation: 'Three people' }\n    ] },\n  { slug: 'family', title: 'Family', glyph: '\\u5988', color: '#5b5fa8', status: 'published', sort_order: 3,\n    chars: [\n      { hanzi: '\\u5988', pinyin: 'm\\u0101', meaning: 'mom' },\n      { hanzi: '\\u7238', pinyin: 'b\\u00e0', meaning: 'dad' },\n      { hanzi: '\\u54e5', pinyin: 'g\\u0113', meaning: 'older brother' },\n      { hanzi: '\\u59d0', pinyin: 'ji\\u011b', meaning: 'older sister' },\n      { hanzi: '\\u5f1f', pinyin: 'd\\u00ec', meaning: 'younger brother' }\n    ],\n    sentences: [\n      { hanzi: '\\u7238\\u7238', pinyin: 'b\\u00e0ba', translation: 'Dad' },\n      { hanzi: '\\u6211\\u54e5\\u54e5', pinyin: 'w\\u01d2 g\\u0113ge', translation: 'My older brother' }\n    ] },\n  { slug: 'food-drink', title: 'Food & drink', glyph: '\\u8336', color: '#b5852e', status: 'published', sort_order: 4,\n    chars: [\n      { hanzi: '\\u7c73', pinyin: 'm\\u01d0', meaning: 'rice' },\n      { hanzi: '\\u996d', pinyin: 'f\\u00e0n', meaning: 'meal' },\n      { hanzi: '\\u8336', pinyin: 'ch\\u00e1', meaning: 'tea' },\n      { hanzi: '\\u6c34', pinyin: 'shu\\u01d0', meaning: 'water' },\n      { hanzi: '\\u9c7c', pinyin: 'y\\u00fa', meaning: 'fish' }\n    ],\n    sentences: [\n      { hanzi: '\\u7c73\\u996d', pinyin: 'm\\u01d0f\\u00e0n', translation: 'Cooked rice' },\n      { hanzi: '\\u559d\\u8336', pinyin: 'h\\u0113 ch\\u00e1', translation: 'Drink tea' }\n    ] }\n];\n\nvar completions = []; // {user_id, pack_slug, activity, duration_ms, completed_at}\n\n/* =====================================================================\n   Workflow events — mirrors VERIFICATION §5 / events.py\n   ===================================================================== */\nvar EVENTS = [];\nfunction emit(workflow, name, fields, outcome) {\n  EVENTS.push({ t: new Date(), workflow: workflow, name: name, fields: fields || {}, outcome: outcome || 'ok' });\n  var c = document.getElementById('evcount');\n  if (c) c.textContent = String(EVENTS.length);\n  var list = document.getElementById('evlist');\n  if (list && document.getElementById('evpanel').classList.contains('open')) renderEvents();\n}\nfunction renderEvents() {\n  var list = document.getElementById('evlist');\n  var rows = EVENTS.slice(-80).reverse().map(function (e) {\n    var f = Object.keys(e.fields).map(function (k) { return k + '=' + e.fields[k]; }).join(' ');\n    var ts = e.t.toTimeString().slice(0, 8);\n    return '<div class=\"evrow' + (e.outcome !== 'ok' ? ' err' : '') + '\">' + ts +\n      ' <span class=\"wf\">' + e.workflow + '<\/span> <span class=\"nm\">' + e.name + '<\/span> <span class=\"fl\">' + f + '<\/span><\/div>';\n  });\n  list.innerHTML = rows.join('');\n}\ndocument.getElementById('evtoggle').addEventListener('click', function () {\n  var p = document.getElementById('evpanel');\n  p.classList.toggle('open');\n  if (p.classList.contains('open')) renderEvents();\n});\n\n/* =====================================================================\n   Mock API — mirrors TDD §4 endpoints. Latency simulated; strokes are\n   served from bundled hanzi-writer-data and cached \"immutably\".\n   ===================================================================== */\nfunction lat(ms) { return new Promise(function (r) { setTimeout(r, ms || (40 + Math.random() * 90)); }); }\nvar strokeCache = {};\n\nfunction progressFor(slug) {\n  var out = { trace: null, match: null, sentence: null };\n  ['trace', 'match', 'sentence'].forEach(function (a) {\n    var rows = completions.filter(function (c) { return c.user_id === GUEST.id && c.pack_slug === slug && c.activity === a; });\n    out[a] = {\n      completed: rows.length > 0,\n      count: rows.length,\n      best_duration_ms: rows.length ? Math.min.apply(null, rows.map(function (r) { return r.duration_ms; })) : null\n    };\n  });\n  return out;\n}\n\nvar api = {\n  listPacks: function () {\n    return lat().then(function () {\n      var out = PACKS.filter(function (p) { return p.status === 'published'; })\n        .sort(function (a, b) { return a.sort_order - b.sort_order; })\n        .map(function (p) {\n          return { slug: p.slug, title: p.title, glyph: p.glyph, color: p.color,\n            char_count: p.chars.length, sentence_count: p.sentences.length, progress: progressFor(p.slug) };\n        });\n      emit('WF-02', 'pack_list_served', { user: GUEST.username, pack_count: out.length });\n      return out;\n    });\n  },\n  getPack: function (slug) {\n    return lat().then(function () {\n      var p = PACKS.find(function (x) { return x.slug === slug && x.status === 'published'; });\n      if (!p) { emit('WF-02', 'pack_served', { pack_slug: slug }, 'error'); throw new Error('404'); }\n      emit('WF-02', 'pack_served', { pack_slug: slug });\n      return Object.assign({}, p, { progress: progressFor(slug) });\n    });\n  },\n  getStrokes: function (hanzi) {\n    var t0 = performance.now();\n    if (strokeCache[hanzi]) {\n      emit('WF-06', 'strokes_served', { hanzi: hanzi, cache_hit: true, duration_ms: 0 });\n      return Promise.resolve(strokeCache[hanzi]);\n    }\n    var url = window.__resources && window.__resources[hanzi];\n    if (!url) {\n      emit('WF-06', 'strokes_missing', { hanzi: hanzi }, 'error');\n      return Promise.reject(new Error('404 strokes for ' + hanzi));\n    }\n    return fetch(url).then(function (r) { return r.json(); }).then(function (data) {\n      strokeCache[hanzi] = data;\n      emit('WF-06', 'strokes_served', { hanzi: hanzi, cache_hit: false, duration_ms: Math.round(performance.now() - t0) });\n      return data;\n    });\n  },\n  postCompletion: function (slug, activity, durationMs) {\n    return lat().then(function () {\n      completions.push({ user_id: GUEST.id, pack_slug: slug, activity: activity, duration_ms: durationMs, completed_at: new Date().toISOString() });\n      var wf = activity === 'trace' ? 'WF-03' : activity === 'match' ? 'WF-04' : 'WF-05';\n      emit(wf, 'activity_completed', { user: GUEST.username, pack_slug: slug, activity: activity, duration_ms: durationMs });\n      return { ok: true };\n    });\n  },\n  resetProgress: function (slug) {\n    return lat().then(function () {\n      var before = completions.length;\n      completions = completions.filter(function (c) { return !(c.user_id === GUEST.id && c.pack_slug === slug); });\n      emit('WF-08', 'progress_reset', { user: GUEST.username, pack_slug: slug, deleted_count: before - completions.length });\n      return { ok: true };\n    });\n  }\n};\n\n/* =====================================================================\n   App state + rendering\n   ===================================================================== */\nvar S = { screen: 'home', pack: null, writer: null, activityStart: 0,\n  t: null, m: null, s: null };\nvar appEl = document.getElementById('app');\n\nfunction esc(x) { return String(x).replace(/&/g, '&amp;').replace(/<\/g, '&lt;'); }\nfunction el(id) { return document.getElementById(id); }\nfunction fmtMs(ms) { return Math.round(ms / 1000) + 's'; }\n\n/* ---------------- home ---------------- */\nfunction renderHome() {\n  S.screen = 'home'; S.pack = null; S.writer = null;\n  appEl.innerHTML =\n    '<div class=\"top\"><div class=\"brand\"><h1>Habagou<\/h1><span class=\"hz\">\\u54c8\\u5df4\\u72d7<\/span><\/div>' +\n    '<div class=\"pill\"><span class=\"dot\"><\/span>Guest<\/div><\/div>' +\n    '<div class=\"tagline\">Learn to write Chinese characters, stroke by stroke.<\/div>' +\n    '<div class=\"cards\" id=\"cards\"><div class=\"card-sub\" style=\"padding:8px 2px\">Loading packs\\u2026<\/div><\/div>';\n  api.listPacks().then(function (packs) {\n    if (S.screen !== 'home') return;\n    el('cards').innerHTML = packs.map(function (p) {\n      var b = ['trace', 'match', 'sentence'].map(function (a) {\n        var done = p.progress[a].completed;\n        return '<span class=\"badge' + (done ? ' done' : '') + '\">' + (done ? '\\u2713 ' : '') + a + '<\/span>';\n      }).join('');\n      return '<button class=\"card\" data-action=\"open-pack\" data-slug=\"' + p.slug + '\">' +\n        '<div class=\"glyph hz\" style=\"background:' + p.color + '22;color:' + p.color + '\">' + p.glyph + '<\/div>' +\n        '<div class=\"card-main\"><div class=\"card-title\">' + esc(p.title) + '<\/div>' +\n        '<div class=\"card-sub\">' + p.char_count + ' characters \\u00b7 ' + p.sentence_count + ' sentences<\/div>' +\n        '<div class=\"badges\">' + b + '<\/div><\/div><div class=\"chev\">\\u203a<\/div><\/button>';\n    }).join('');\n  });\n}\n\n/* ---------------- pack ---------------- */\nfunction renderPack(slug) {\n  S.screen = 'pack'; S.writer = null;\n  appEl.innerHTML = '<button class=\"back\" data-action=\"home\">\\u2039 All packs<\/button><div id=\"pack-body\" class=\"card-sub\">Loading\\u2026<\/div>';\n  api.getPack(slug).then(function (p) {\n    if (S.screen !== 'pack') return;\n    S.pack = p;\n    var acts = [\n      { key: 'trace', icon: '\\u270e', title: 'Trace', sub: 'Write each character stroke by stroke' },\n      { key: 'match', icon: '\\u29c9', title: 'Match', sub: 'Pair characters with their meanings' },\n      { key: 'sentence', icon: '\\u2630', title: 'Sentences', sub: 'Write ' + p.sentences.length + ' full sentences' }\n    ].map(function (a) {\n      var pr = p.progress[a.key];\n      var right = pr.completed\n        ? '<span class=\"check\">\\u2713 completed<\/span>' + (a.key === 'match' && pr.best_duration_ms != null ? ' <span class=\"best\">best ' + fmtMs(pr.best_duration_ms) + '<\/span>' : '')\n        : '';\n      return '<button class=\"act\" data-action=\"start\" data-activity=\"' + a.key + '\">' +\n        '<div class=\"act-ic\" style=\"color:' + p.color + '\">' + a.icon + '<\/div>' +\n        '<div class=\"act-main\"><div class=\"act-title\">' + a.title + ' ' + right + '<\/div>' +\n        '<div class=\"act-sub\">' + a.sub + '<\/div><\/div><div class=\"chev\">\\u203a<\/div><\/button>';\n    }).join('');\n    el('pack-body').outerHTML =\n      '<div class=\"pack-head\"><div class=\"glyph hz\" style=\"background:' + p.color + '22;color:' + p.color + '\">' + p.glyph + '<\/div>' +\n      '<div><div class=\"pack-title\">' + esc(p.title) + '<\/div><div class=\"card-sub\">' + p.chars.length + ' characters \\u00b7 ' + p.sentences.length + ' sentences<\/div><\/div><\/div>' +\n      '<div class=\"chips\">' + p.chars.map(function (c) { return '<div class=\"chip hz\">' + c.hanzi + '<\/div>'; }).join('') + '<\/div>' +\n      '<div class=\"acts\">' + acts + '<\/div>' +\n      '<div class=\"reset\"><button data-action=\"reset\">Reset progress for this pack<\/button><\/div>';\n    // Prefetch strokes for pack chars AND sentence-only chars (TDD §6)\n    var all = {};\n    p.chars.forEach(function (c) { all[c.hanzi] = 1; });\n    p.sentences.forEach(function (s) { Array.from(s.hanzi).forEach(function (h) { all[h] = 1; }); });\n    Object.keys(all).forEach(function (h) { api.getStrokes(h).catch(function () {}); });\n  });\n}\n\n/* ---------------- shared writer ---------------- */\nfunction createWriter(char, cbs) {\n  var target = el('hw-target');\n  if (!target || !window.HanziWriter) { setTimeout(function () { createWriter(char, cbs); }, 80); return; }\n  target.innerHTML = '';\n  var size = Math.round(target.clientWidth) || 300;\n  api.getStrokes(char).then(function (data) {\n    var cur = el('hw-target');\n    if (!cur) return;\n    cur.innerHTML = '';\n    S.writer = window.HanziWriter.create(cur, char, {\n      width: size, height: size, padding: 16,\n      showCharacter: false, showOutline: true,\n      strokeColor: '#9fd8c2', outlineColor: 'rgba(232,236,238,0.16)',\n      drawingColor: '#5fb89a', highlightColor: '#5fb89a',\n      drawingWidth: Math.round(size * 0.085),\n      showHintAfterMisses: 3,\n      charDataLoader: function (c, done) { done(data); }\n    });\n    if (data && data.strokes) cbs.onTotal(data.strokes.length);\n    S.writer.quiz({\n      onCorrectStroke: function (d) { cbs.onStroke(d.strokeNum + 1); },\n      onComplete: function () { S.writer.showCharacter({ duration: 380 }); cbs.onComplete(); }\n    });\n  }).catch(function () {\n    var cur = el('hw-target');\n    if (cur) cur.innerHTML = '<div style=\"color:var(--error-bright);font-size:14px\">Stroke data unavailable for ' + esc(char) + '<\/div>';\n  });\n}\nfunction curStrokesDone() { return S.screen === 'sentence' ? S.s.strokesDone : S.t.strokesDone; }\n\n/* ---------------- trace ---------------- */\nfunction startTrace() {\n  S.screen = 'trace';\n  S.t = { idx: 0, strokesDone: 0, total: 0, charComplete: false, done: false };\n  S.activityStart = Date.now();\n  renderTraceSkeleton();\n  startTraceChar();\n}\nfunction renderTraceSkeleton() {\n  appEl.innerHTML =\n    '<div class=\"abar\"><button class=\"back\" data-action=\"back-pack\" style=\"margin:0\">\\u2039 ' + esc(S.pack.title) + '<\/button><span class=\"counter\" id=\"t-counter\"><\/span><\/div>' +\n    '<div class=\"pbar\"><div class=\"pfill\" id=\"t-pfill\" style=\"width:0%\"><\/div><\/div>' +\n    '<div class=\"char-meta\"><div class=\"pinyin\" id=\"t-pinyin\"><\/div><div class=\"meaning\" id=\"t-meaning\"><\/div><\/div>' +\n    '<div class=\"canvas-card\"><div id=\"hw-target\"><\/div><\/div>' +\n    '<div class=\"instr\" id=\"t-instr\"><\/div>' +\n    '<div id=\"t-foot\"><\/div>';\n}\nfunction updateTraceUI() {\n  var t = S.t, total = S.pack.chars.length, cur = S.pack.chars[t.idx];\n  el('t-counter').textContent = (t.idx + 1) + ' / ' + total;\n  el('t-pfill').style.width = Math.round(((t.idx + (t.charComplete ? 1 : 0)) / total) * 100) + '%';\n  el('t-pinyin').textContent = cur.pinyin;\n  el('t-meaning').textContent = cur.meaning;\n  if (t.charComplete) {\n    el('t-instr').innerHTML = '<span class=\"complete-line\">Nice \\u2014 that\\u2019s <span class=\"hz\">' + cur.hanzi + '<\/span><\/span>';\n    el('t-foot').innerHTML = '<button class=\"cta\" data-action=\"t-next\">' + (t.idx === total - 1 ? 'Finish' : 'Next character') + '<\/button>';\n  } else {\n    el('t-instr').textContent = t.total > 0 ? 'Stroke ' + Math.min(t.strokesDone + 1, t.total) + ' of ' + t.total : 'Trace the character';\n    el('t-foot').innerHTML = '<div class=\"footer-acts\"><button class=\"fbtn\" data-action=\"hint\">Hint<\/button><button class=\"fbtn\" data-action=\"redo\">Redo<\/button><\/div>';\n  }\n}\nfunction startTraceChar() {\n  var t = S.t;\n  t.strokesDone = 0; t.total = 0; t.charComplete = false;\n  updateTraceUI();\n  createWriter(S.pack.chars[t.idx].hanzi, {\n    onTotal: function (n) { if (S.screen !== 'trace') return; t.total = n; updateTraceUI(); },\n    onStroke: function (n) { if (S.screen !== 'trace') return; t.strokesDone = n; updateTraceUI(); },\n    onComplete: function () { if (S.screen !== 'trace') return; t.charComplete = true; updateTraceUI(); }\n  });\n}\nfunction traceNext() {\n  var t = S.t;\n  if (t.idx >= S.pack.chars.length - 1) { finishActivity('trace'); return; }\n  t.idx += 1; startTraceChar();\n}\n\n/* ---------------- match ---------------- */\nfunction startMatch() {\n  S.screen = 'match';\n  var chars = S.pack.chars;\n  var left = chars.map(function (c, i) { return { key: 'L' + i, id: i, side: 'L', label: c.hanzi }; });\n  var right = chars.map(function (c, i) { return { key: 'R' + i, id: i, side: 'R', label: c.meaning, sub: c.pinyin }; });\n  for (var i = right.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var tmp = right[i]; right[i] = right[j]; right[j] = tmp; }\n  S.m = { left: left, right: right, sel: null, matched: [], wrong: [] };\n  S.activityStart = Date.now();\n  appEl.innerHTML =\n    '<div class=\"abar\"><button class=\"back\" data-action=\"back-pack\" style=\"margin:0\">\\u2039 ' + esc(S.pack.title) + '<\/button><span class=\"counter\" id=\"m-counter\"><\/span><\/div>' +\n    '<div class=\"instr\" style=\"text-align:left;margin-bottom:16px\">Tap a character, then its meaning.<\/div>' +\n    '<div class=\"match-grid\"><div class=\"mcol\" id=\"m-left\"><\/div><div class=\"mcol\" id=\"m-right\"><\/div><\/div>';\n  updateMatchUI();\n}\nfunction mcardHTML(c) {\n  var m = S.m;\n  var cls = 'mcard' + (c.side === 'L' ? ' hanzi' : '');\n  if (m.matched.indexOf(c.id) >= 0) cls += ' ok';\n  else if (m.wrong.indexOf(c.key) >= 0) cls += ' bad';\n  else if (m.sel && m.sel.key === c.key) cls += ' sel';\n  return '<button class=\"' + cls + '\" data-action=\"m-tap\" data-key=\"' + c.key + '\">' +\n    '<span class=\"l' + (c.side === 'L' ? ' hz' : '') + '\">' + esc(c.label) + '<\/span>' +\n    (c.sub ? '<span class=\"s\">' + esc(c.sub) + '<\/span>' : '') + '<\/button>';\n}\nfunction updateMatchUI() {\n  var m = S.m;\n  el('m-counter').textContent = m.matched.length + ' / ' + m.left.length;\n  el('m-left').innerHTML = m.left.map(mcardHTML).join('');\n  el('m-right').innerHTML = m.right.map(mcardHTML).join('');\n}\nfunction matchTap(key) {\n  var m = S.m;\n  var card = m.left.concat(m.right).find(function (c) { return c.key === key; });\n  if (!card || m.matched.indexOf(card.id) >= 0 || m.wrong.length) return;\n  if (!m.sel) { m.sel = card; updateMatchUI(); return; }\n  if (m.sel.key === card.key) { m.sel = null; updateMatchUI(); return; }\n  if (m.sel.side === card.side) { m.sel = card; updateMatchUI(); return; }\n  if (m.sel.id === card.id) {\n    m.matched.push(card.id); m.sel = null; updateMatchUI();\n    if (m.matched.length === m.left.length) setTimeout(function () { if (S.screen === 'match') finishActivity('match'); }, 420);\n  } else {\n    m.wrong = [m.sel.key, card.key]; updateMatchUI();\n    setTimeout(function () { if (S.screen !== 'match') return; m.sel = null; m.wrong = []; updateMatchUI(); }, 560);\n  }\n}\n\n/* ---------------- sentence ---------------- */\nfunction startSentence() {\n  S.screen = 'sentence';\n  S.s = { idx: 0, pos: 0, strokesDone: 0, total: 0, charComplete: false, sentenceDone: false };\n  S.activityStart = Date.now();\n  renderSentenceSkeleton();\n  startSentenceChar();\n}\nfunction sentenceChars() { return Array.from(S.pack.sentences[S.s.idx].hanzi); }\nfunction renderSentenceSkeleton() {\n  appEl.innerHTML =\n    '<div class=\"abar\"><button class=\"back\" data-action=\"back-pack\" style=\"margin:0\">\\u2039 ' + esc(S.pack.title) + '<\/button><span class=\"counter\" id=\"s-counter\"><\/span><\/div>' +\n    '<div class=\"pbar\"><div class=\"pfill\" id=\"s-pfill\" style=\"width:0%\"><\/div><\/div>' +\n    '<div class=\"s-meta\"><div class=\"s-trans\" id=\"s-trans\"><\/div><div class=\"s-pin\" id=\"s-pin\"><\/div><\/div>' +\n    '<div class=\"cells\" id=\"s-cells\"><\/div>' +\n    '<div class=\"canvas-card\"><div id=\"hw-target\"><\/div><\/div>' +\n    '<div class=\"instr\" id=\"s-instr\"><\/div>' +\n    '<div id=\"s-foot\"><\/div>';\n}\nfunction updateSentenceUI() {\n  var s = S.s, sent = S.pack.sentences[s.idx], total = S.pack.sentences.length, cells = sentenceChars();\n  el('s-counter').textContent = (s.idx + 1) + ' / ' + total;\n  el('s-pfill').style.width = Math.round(((s.idx + (s.sentenceDone ? 1 : 0)) / total) * 100) + '%';\n  el('s-trans').textContent = sent.translation;\n  el('s-pin').textContent = sent.pinyin;\n  el('s-cells').innerHTML = cells.map(function (h, i) {\n    var cls = 'cell hz';\n    if (i < s.pos || (i === s.pos && s.charComplete)) cls += ' done';\n    else if (i === s.pos && !s.charComplete) cls += ' active';\n    return '<div class=\"' + cls + '\">' + h + '<\/div>';\n  }).join('');\n  if (s.charComplete) {\n    var label = s.sentenceDone ? '<span class=\"hz\">' + sent.hanzi + '<\/span> \\u2014 done' : 'Nice \\u2014 that\\u2019s <span class=\"hz\">' + cells[s.pos] + '<\/span>';\n    var next = s.sentenceDone ? (s.idx === total - 1 ? 'Finish' : 'Next sentence') : 'Next character';\n    el('s-instr').innerHTML = '<span class=\"complete-line\">' + label + '<\/span>';\n    el('s-foot').innerHTML = '<button class=\"cta\" data-action=\"s-next\">' + next + '<\/button>';\n  } else {\n    el('s-instr').textContent = s.total > 0 ? 'Stroke ' + Math.min(s.strokesDone + 1, s.total) + ' of ' + s.total : 'Trace the character';\n    el('s-foot').innerHTML = '<div class=\"footer-acts\"><button class=\"fbtn\" data-action=\"hint\">Hint<\/button><button class=\"fbtn\" data-action=\"redo\">Redo<\/button><\/div>';\n  }\n}\nfunction startSentenceChar() {\n  var s = S.s;\n  s.strokesDone = 0; s.total = 0; s.charComplete = false; s.sentenceDone = false;\n  updateSentenceUI();\n  createWriter(sentenceChars()[s.pos], {\n    onTotal: function (n) { if (S.screen !== 'sentence') return; s.total = n; updateSentenceUI(); },\n    onStroke: function (n) { if (S.screen !== 'sentence') return; s.strokesDone = n; updateSentenceUI(); },\n    onComplete: function () {\n      if (S.screen !== 'sentence') return;\n      s.charComplete = true;\n      s.sentenceDone = s.pos >= sentenceChars().length - 1;\n      updateSentenceUI();\n    }\n  });\n}\nfunction sentenceNext() {\n  var s = S.s, total = S.pack.sentences.length;\n  if (!s.sentenceDone) { s.pos += 1; startSentenceChar(); return; }\n  if (s.idx >= total - 1) { finishActivity('sentence'); return; }\n  s.idx += 1; s.pos = 0; startSentenceChar();\n}\n\n/* ---------------- done ---------------- */\nfunction finishActivity(activity) {\n  S.writer = null;\n  var duration = Date.now() - S.activityStart;\n  S.screen = 'done';\n  var titles = { trace: 'Pack traced!', match: 'All matched!', sentence: 'Sentences complete!' };\n  var subs = {\n    trace: 'You wrote every character in ' + S.pack.title + '.',\n    match: 'Finished in ' + fmtMs(duration) + '.',\n    sentence: 'You wrote every sentence in ' + S.pack.title + '.'\n  };\n  appEl.innerHTML =\n    '<div class=\"done\"><div class=\"big\">\\ud83c\\udf89<\/div><h2>' + titles[activity] + '<\/h2><p>' + subs[activity] + '<\/p>' +\n    '<div class=\"rec\" id=\"rec\">Recording completion\\u2026<\/div><div>' +\n    '<button class=\"cta\" data-action=\"back-pack\">Back to ' + esc(S.pack.title) + '<\/button><\/div><\/div>';\n  api.postCompletion(S.pack.slug, activity, duration).then(function () {\n    var r = el('rec');\n    if (r) r.innerHTML = '\\u2713 Completion recorded for <b>&nbsp;guest&nbsp;<\/b> \\u00b7 ' + activity + ' \\u00b7 ' + fmtMs(duration);\n  });\n}\n\n/* ---------------- actions ---------------- */\nappEl.addEventListener('click', function (ev) {\n  var b = ev.target.closest('[data-action]');\n  if (!b) return;\n  var a = b.getAttribute('data-action');\n  if (a === 'home') renderHome();\n  else if (a === 'open-pack') renderPack(b.getAttribute('data-slug'));\n  else if (a === 'back-pack') renderPack(S.pack.slug);\n  else if (a === 'start') {\n    var act = b.getAttribute('data-activity');\n    if (act === 'trace') startTrace();\n    else if (act === 'match') startMatch();\n    else startSentence();\n  }\n  else if (a === 'reset') {\n    if (window.confirm('Reset your progress for \\u201c' + S.pack.title + '\\u201d? This deletes all recorded completions for this pack.')) {\n      api.resetProgress(S.pack.slug).then(function () { renderPack(S.pack.slug); });\n    }\n  }\n  else if (a === 'hint') { if (S.writer) S.writer.animateStroke(curStrokesDone()); }\n  else if (a === 'redo') { if (S.screen === 'sentence') startSentenceChar(); else startTraceChar(); }\n  else if (a === 't-next') traceNext();\n  else if (a === 'm-tap') matchTap(b.getAttribute('data-key'));\n  else if (a === 's-next') sentenceNext();\n});\n\n/* ---------------- boot (WF-01) ---------------- */\nvar charsLoaded = window.__resources ? Object.keys(window.__resources).filter(function (k) { return k !== 'hwLib'; }).length : 0;\nemit('WF-01', 'bootstrap_completed', { chars_loaded: charsLoaded, packs_seeded: PACKS.length, guest_user: GUEST.username });\nrenderHome();\n})();\n<\/script>\n<\/body><\/html>\n"
  </script>
